<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat-Dog Clicker App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 flex items-center justify-center p-4">
  <div class="pet-container flex gap-6 md:gap-8 lg:gap-12 flex-wrap justify-center items-center max-w-4xl">
    <div class="pet relative cursor-pointer transition-transform duration-200 hover:scale-110 hover:rotate-3 active:scale-95 rounded-2xl p-4 bg-white shadow-lg hover:shadow-2xl" data-pet-type="cat">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🐱%3C/text%3E%3C/svg%3E" alt="Cat" class="w-24 h-24 sm:w-32 sm:h-32 md:w-40 md:h-40 select-none" width="150" height="150">
    </div>
    <div class="pet relative cursor-pointer transition-transform duration-200 hover:scale-110 hover:rotate-3 active:scale-95 rounded-2xl p-4 bg-white shadow-lg hover:shadow-2xl" data-pet-type="dog">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🐶%3C/text%3E%3C/svg%3E" alt="Dog" class="w-24 h-24 sm:w-32 sm:h-32 md:w-40 md:h-40 select-none" width="150" height="150">
    </div>
  </div>

  <script>
    // JavaScript functionality will be added in subsequent tasks
  </script>
</body>
</html>
